<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fish photographingg</title>
    <style>
        /* Import a fallback retro pixel font from Google Fonts just in case */
        @import url('https://fonts.googleapis.com/css2?family=VT323&display=swap');

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            /* Force crisp, sharp, non-blurred rendering for pixel-art styles */
            image-rendering: pixelated;
            image-rendering: crisp-edges;
        }
        body {
            background-color: #a0c4ff; /* Medium light blue */
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            cursor: default;
            user-select: none;
            /* Prioritize your local Scratch Pixel font, fallback to generic pixel and monospace fonts */
            font-family: 'Scratch Pixel', 'VT323', Monaco, Courier, monospace;
            color: #ffffff;
            position: relative;
        }
        
        /* Money counter styling in top left */
        #money-counter {
            position: absolute;
            top: 20px;
            left: 20px;
            font-size: 32px;
            font-weight: bold;
            text-shadow: 2px 2px 0px #000000;
            z-index: 100;
        }

        /* Reset Progress Button in Top Right */
        #reset-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            background: #ff3b30;
            color: white;
            border: 4px solid #000000;
            border-radius: 0px;
            padding: 6px 16px;
            cursor: pointer;
            font-family: inherit;
            font-weight: bold;
            font-size: 18px;
            z-index: 1100;
            pointer-events: auto;
        }
        #reset-btn:hover {
            background: #d32f2f;
        }
        #reset-btn:active {
            transform: translate(2px, 2px);
        }

        /* Money popup above the camera */
        #money-popup {
            position: absolute;
            font-size: 28px;
            font-weight: bold;
            color: #ffd700;
            text-shadow: 2px 2px 0px #000000;
            pointer-events: none;
            z-index: 2000;
            opacity: 0;
            transform: translate(-50%, -100%);
            transition: opacity 0.3s ease-out, top 0.3s ease-out;
        }
        
        /* UI Control Layer */
        .ui-container {
            position: absolute;
            top: 20px;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            pointer-events: none;
            z-index: 10;
        }
        .instruction {
            text-align: center;
            text-shadow: 2px 2px 0px #000000;
            font-size: 24px;
        }
        .instruction span {
            display: block;
            font-size: 18px;
            opacity: 0.8;
            margin-top: 5px;
        }
        
        /* Slider controls container with pixel theme */
        .controls {
            margin-top: 15px;
            pointer-events: auto; 
            background: #222222;
            border: 4px solid #000000; /* Sharp black border */
            padding: 8px 16px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .controls label {
            font-size: 16px;
        }
        .controls input[type="range"] {
            cursor: pointer;
            accent-color: #ffffff;
        }

        /* Squash and Stretch CSS Animation for active swimming */
        @keyframes swimWobble {
            0% { transform: scale(1, 1); }
            25% { transform: scale(1.08, 0.92); }
            50% { transform: scale(1, 1); }
            75% { transform: scale(0.92, 1.08); }
            100% { transform: scale(1, 1); }
        }

        /* Fish Container */
        .sardine-container {
            position: absolute;
            pointer-events: none;
            z-index: 5;
        }

        .sardine-img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            animation: swimWobble 0.7s infinite ease-in-out;
        }

        /* Camera Frame Container */
        #camera-container {
            position: absolute;
            width: 340px; 
            height: 340px;
            pointer-events: none;
            transform: translate(-50%, -50%);
            z-index: 1000;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: left 0.4s cubic-bezier(0.25, 1, 0.5, 1), 
                        top 0.4s cubic-bezier(0.25, 1, 0.5, 1), 
                        width 0.4s cubic-bezier(0.25, 1, 0.5, 1), 
                        height 0.4s cubic-bezier(0.25, 1, 0.5, 1);
        }

        /* The fishcamera image with a hole in it */
        #fish-camera-img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 2;
        }

        /* The Viewfinder/Hole where live rendering happens */
        #viewfinder {
            width: 65%; 
            height: 65%;
            margin-top: 15px;      /* Shift down */
            margin-left: -12px;    /* Shift left */
            border-radius: 0px; 
            border: 4px solid transparent; /* Invisible frame border */
            overflow: hidden;
            position: relative;
            z-index: 1;
            background: transparent;
        }

        /* Live Preview & Photo Capture Canvas combination layer */
        #photo-canvas {
            width: 100%;
            height: 100%;
            display: block; 
        }

        /* Flash overlay effect */
        #flash {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: white;
            opacity: 0;
            pointer-events: none;
            z-index: 2000;
        }

        /* Enlarged Gallery Button in Bottom Right */
        #gallery-btn {
            position: absolute;
            bottom: 25px;
            right: 25px;
            width: 110px; 
            height: 110px;
            cursor: pointer;
            z-index: 1100;
            pointer-events: auto;
            transition: transform 0.1s ease;
        }
        #gallery-btn:hover {
            transform: scale(1.05);
        }
        #gallery-btn:active {
            transform: scale(0.95);
        }
        #gallery-btn-img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        /* Upgrades Container on Bottom Left side rearranged into columns */
        #upgrades-container {
            position: absolute;
            bottom: 25px;
            left: 25px;
            display: flex;
            flex-direction: row;
            gap: 12px;
            z-index: 1100;
            pointer-events: auto;
        }
        .upgrade-column {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .upgrade-btn {
            background: #ffd700;
            color: #000000;
            border: 4px solid #000000;
            border-radius: 0px;
            padding: 10px 16px;
            cursor: pointer;
            font-family: inherit;
            font-weight: bold;
            font-size: 16px;
            text-align: left;
            min-width: 240px;
            box-shadow: 2px 2px 0px #000000;
        }
        .upgrade-btn:hover {
            background: #ffea70;
        }
        .upgrade-btn:disabled {
            background: #8c834e;
            color: #444444;
            cursor: not-allowed;
            box-shadow: none;
        }
        .upgrade-btn:active:not(:disabled) {
            transform: translate(2px, 2px);
            box-shadow: none;
        }

        /* RETRO PIXEL ART SCROLLABLE COLLECTION PANEL */
        #gallery-panel {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.9);
            width: 85%;
            max-width: 650px;
            height: 75%;
            background: #111e36; /* Fully Opaque Dark Navy background */
            border: 6px solid #000000; /* Heavy Sharp Black Outline */
            border-radius: 0px; /* 100% Sharp Corners */
            padding: 25px;
            display: flex;
            flex-direction: column;
            z-index: 1500;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s ease, transform 0.2s ease;
        }
        #gallery-panel.active {
            opacity: 1;
            pointer-events: auto;
            transform: translate(-50%, -50%) scale(1);
        }
        #gallery-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            border-bottom: 4px solid #000000; /* Sharp black divider line */
            padding-bottom: 12px;
        }
        #gallery-header h2 {
            font-size: 32px;
            letter-spacing: 1px;
            color: #ffd700; /* Gold heading */
            text-shadow: 2px 2px 0px #000000;
        }
        #gallery-close-btn {
            background: #ff5f56;
            color: white;
            border: 4px solid #000000; /* Sharp Black Outline */
            border-radius: 0px; /* Sharp Edges */
            padding: 6px 16px;
            cursor: pointer;
            font-family: inherit;
            font-weight: bold;
            font-size: 18px;
        }
        #gallery-close-btn:hover {
            background: #ff3b30;
        }
        #gallery-close-btn:active {
            transform: translate(2px, 2px);
        }
        #gallery-content {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
            padding-right: 8px;
        }
        /* Sharp Pixelated Custom scrollbar for collection panel */
        #gallery-content::-webkit-scrollbar {
            width: 12px;
        }
        #gallery-content::-webkit-scrollbar-track {
            background: #09101d;
            border-left: 4px solid #000000;
        }
        #gallery-content::-webkit-scrollbar-thumb {
            background: #ffffff;
            border: 4px solid #000000;
            border-radius: 0px;
        }
        #gallery-content::-webkit-scrollbar-thumb:hover {
            background: #cccccc;
        }
        
        /* Redesigned Sharp Retro Fish Record Card Layout */
        .gallery-item {
            background: #192c4d; /* Fully opaque layout container */
            border: 4px solid #000000; /* Sharp Black Outline */
            border-radius: 0px; /* Completely Sharp Edges */
            padding: 15px;
            display: flex;
            align-items: center;
            gap: 20px;
        }
        .gallery-item-img-wrapper {
            width: 100px;
            height: 70px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #0c1626;
            border: 4px solid #000000; /* Sharp Black Inner Frame Outline */
            border-radius: 0px; /* Sharp Edges */
            padding: 5px;
        }
        .gallery-item-img-wrapper img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }
        .gallery-item-details {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .gallery-item-title-row {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
        }
        .gallery-item-name {
            font-size: 22px;
            font-weight: bold;
            color: #ffffff;
            text-shadow: 2px 2px 0px #000000;
        }
        .gallery-item-value {
            font-size: 20px;
            font-weight: bold;
            color: #4cd964; /* Vibrant green for retro reward values */
            text-shadow: 2px 2px 0px #000000;
        }
        .gallery-item-desc {
            font-size: 16px;
            color: #b0c4de;
            line-height: 1.4;
        }
    </style>
</head>
<body>

    <div id="money-counter">0$</div>
    <button id="reset-btn" onclick="resetGameProgress(event)" onmousedown="event.stopPropagation();" onmouseup="event.stopPropagation();">Reset Progress</button>
    
    <div id="money-popup">+$0</div>
    <div id="flash"></div>
    <div class="ui-container">
        <div class="instruction">
            <span></span>
        </div>
        <div class="controls" onmousedown="event.stopPropagation();" onmouseup="event.stopPropagation();">
            <label for="zoomSlider"> Zoom Out</label>
            <input type="range" id="zoomSlider" min="0.2" max="1.5" step="0.05" value="1.2">
            <label for="zoomSlider">Zoom In</label>
        </div>
    </div>

    <div id="camera-container">
        <img id="fish-camera-img" src="fishcamera.png" alt="Fish Camera">
        <div id="viewfinder">
            <canvas id="photo-canvas"></canvas>
        </div>
    </div>

    <div id="upgrades-container" onmousedown="event.stopPropagation();" onmouseup="event.stopPropagation();">
        <div class="upgrade-column">
            <button id="upgrade-quality-btn" class="upgrade-btn" onclick="buyUpgrade('quality')">Photo Quality: Lvl 0 ($200)</button>
            <button id="upgrade-size-btn" class="upgrade-btn" onclick="buyUpgrade('size')">Size Increase: Lvl 0 ($200)</button>
        </div>
        <div class="upgrade-column">
            <button id="upgrade-spawn-btn" class="upgrade-btn" onclick="buyUpgrade('spawn')">Spawn Rate: Lvl 0 ($3000)</button>
            <button id="upgrade-rarity-btn" class="upgrade-btn" onclick="buyUpgrade('rarity')">Rarity Luck: Lvl 0 ($1200)</button>
        </div>
    </div>

    <div id="gallery-btn" onclick="toggleGallery(true)" onmousedown="event.stopPropagation();" onmouseup="event.stopPropagation();">
        <img id="gallery-btn-img" src="gallery.png" alt="Gallery">
    </div>

    <div id="gallery-panel" onmousedown="event.stopPropagation();" onmouseup="event.stopPropagation();">
        <div id="gallery-header">
            <h2>Fish Collection</h2>
            <button id="gallery-close-btn" onclick="toggleGallery(false)">Close</button>
        </div>
        <div id="gallery-content">
            </div>
    </div>

    <script>
        // =========================================================================
        // EASILY EDITABLE & COPIABLE FISH LIST REGISTER
        // =========================================================================
        // REMOVED GIANT SARDINE TYPE
        const FISH_DATABASE = [
            {
                id: "sardine",
                name: "Sardine",
                description: "regular fishy",
                imageSrc: "sardine.png",
                value: 10,
                baseWidth: 180,
                baseHeight: 90,
                minSpeed: 0.8,
                maxSpeed: 1.6,
                rarity: 80,
                vStretch: 2.0
            },
            {
                id: "anchovy",
                name: "Anchovy",
                description: "these fish like being togheter.",
                imageSrc: "anchovy.png",
                value: 5,
                baseWidth: 110,
                baseHeight: 55,
                minSpeed: 1.4,
                maxSpeed: 2.2,
                rarity: 13,
                vStretch: 2.0
            },
            {
                id: "Mola_mola",
                name: "Mola mola",
                description: "a very fat stupid fish",
                imageSrc: "mola.png", 
                value: 90,
                baseWidth: 250,
                baseHeight: 250,
                minSpeed: .5,
                maxSpeed: 1.5,
                rarity: 8,
                vStretch: 1.0
            },
            {
                id: "Mahi_mahi",
                name: "mahi mahi",
                description: "a coloful fast fish",
                imageSrc: "mahimahi.png", 
                value: 135,
                baseWidth: 330,
                baseHeight: 165,
                minSpeed: 2,
                maxSpeed: 4,
                rarity: 3.5,
                vStretch: 2.0
            },
            {
                id: "Clownfish",
                name: "Clownfish",
                description: "a cute and colorful fish that loves anemones",
                imageSrc: "clownfish.png", 
                value: 35,
                baseWidth: 180,
                baseHeight: 90,
                minSpeed: 1,
                maxSpeed: 2,
                rarity: 15,
                vStretch: 2.0
            },
            {
                id: "Golden_sardine",
                name: "Golden sardine",
                description: "a very rare fish made out of gold",
                imageSrc: "golden.png", 
                value: 500,
                baseWidth: 180,
                baseHeight: 90,
                minSpeed: 1.5,
                maxSpeed: 2.5,
                rarity: 0.2,
                vStretch: 2.0
            },
            {
                id: "Whale_shark",
                name: "Whale shark",
                description: "a giant fish, you should photograph it multiple times.",
                imageSrc: "whale.png", 
                value: 200,
                baseWidth: 1000,
                baseHeight: 500,
                minSpeed: 1,
                maxSpeed: 1,
                rarity: 0.5,
                vStretch: 2.0
             },
             {
                id: "Marlin",
                name: "marlin",
                description: "a very fast fish that is worth quite a lot",
                imageSrc: "marlin.png", 
                value: 350,
                baseWidth: 420,
                baseHeight: 210,
                minSpeed: 4,
                maxSpeed: 6.5,
                rarity: 2,
                vStretch: 2.0
            }
        ];

        const cameraContainer = document.getElementById('camera-container');
        const photoCanvas = document.getElementById('photo-canvas');
        const flash = document.getElementById('flash');
        const zoomSlider = document.getElementById('zoomSlider');
        const moneyCounter = document.getElementById('money-counter');
        const moneyPopup = document.getElementById('money-popup');
        const galleryPanel = document.getElementById('gallery-panel');
        const galleryContent = document.getElementById('gallery-content');
        const pCtx = photoCanvas.getContext('2d');
        
        let isHolding = false;
        let isTakingPhoto = false;
        let mouseX = 0;
        let mouseY = 0;

        // Progress variables saved locally
        let currentMoney = 0;
        let discoveredFishIds = []; 

        // Upgrade Track Levels
        let qualityLevel = 0;
        let sizeLevel = 0;
        let spawnLevel = 0;
        let rarityLevel = 0;

        const normalSize = 340; 
        const photoSize = 520;  

        let sardinesList = [];
        let lastUpdateTime = performance.now();

        // Calculate dynamic upgrade costs matching rule: 200, +1.2x first time, +1.2x everytime
        function getUpgradeCost(level) {
            let cost = 200;
            for (let i = 0; i < level; i++) {
                cost = cost * 1.2 + 1.2;
            }
            return Math.floor(cost);
        }

        // Update Button labels and states based on current cash availability
        function updateUpgradesUI() {
    const qualityCost = getUpgradeCost(qualityLevel);
    const qualityBtn = document.getElementById('upgrade-quality-btn');
    qualityBtn.innerText = `Photo Quality: Lvl ${qualityLevel} ($${qualityCost})`;
    qualityBtn.disabled = currentMoney < qualityCost;

    // Size UI with Max Cap Check
    const sizeBtn = document.getElementById('upgrade-size-btn');
    if (sizeLevel >= 20) {
        sizeBtn.innerText = `Size Increase: Lvl 20 (MAX)`;
        sizeBtn.disabled = true;
    } else {
        const sizeCost = getUpgradeCost(sizeLevel);
        sizeBtn.innerText = `Size Increase: Lvl ${sizeLevel} ($${sizeCost})`;
        sizeBtn.disabled = currentMoney < sizeCost;
    }

    // Spawn Rate UI with Max Cap Check
    const spawnBtn = document.getElementById('upgrade-spawn-btn');
    if (spawnLevel >= 15) {
        spawnBtn.innerText = `Spawn Rate: Lvl 15 (MAX)`;
        spawnBtn.disabled = true;
    } else {
        const spawnCost = getUpgradeCost(spawnLevel);
        spawnBtn.innerText = `Spawn Rate: Lvl ${spawnLevel} ($${spawnCost})`;
        spawnBtn.disabled = currentMoney < spawnCost;
    }

    // Rarity Luck UI with Max Cap Check
    const rarityBtn = document.getElementById('upgrade-rarity-btn');
    if (rarityLevel >= 10) {
        rarityBtn.innerText = `Rarity Luck: Lvl 10 (MAX)`;
        rarityBtn.disabled = true;
    } else {
        const rarityCost = getUpgradeCost(rarityLevel);
        rarityBtn.innerText = `Rarity Luck: Lvl ${rarityLevel} ($${rarityCost})`;
        rarityBtn.disabled = currentMoney < rarityCost;
    }
}
        // Handle upgrade purchase transactions
        function buyUpgrade(type) {
    if (type === 'quality') {
        const cost = getUpgradeCost(qualityLevel);
        if (currentMoney >= cost) {
            currentMoney -= cost;
            qualityLevel++;
        }
    } else if (type === 'size') {
        // --- MAX LEVEL CAP: 30 ---
        if (sizeLevel >= 20) return; 
        
        const cost = getUpgradeCost(sizeLevel);
        if (currentMoney >= cost) {
            currentMoney -= cost;
            sizeLevel++;
        }
    } else if (type === 'spawn') {
        // --- MAX LEVEL CAP: 20 ---
        if (spawnLevel >= 15) return;

        const cost = getUpgradeCost(spawnLevel);
        if (currentMoney >= cost) {
            currentMoney -= cost;
            spawnLevel++;
        }
    } else if (type === 'rarity') {
        // --- MAX LEVEL CAP: 20 ---
        if (rarityLevel >= 10) return;

        const cost = getUpgradeCost(rarityLevel);
        if (currentMoney >= cost) {
            currentMoney -= cost;
            rarityLevel++;
        }
    }
    moneyCounter.innerText = currentMoney + '$';
    updateUpgradesUI();
    saveGameProgress();
}

        // --- Progress Saving & Loading Logic ---
        function loadGameProgress() {
            try {
                const savedMoney = localStorage.getItem('fish_game_money');
                if (savedMoney !== null) {
                    currentMoney = parseInt(savedMoney, 10);
                }
                
                const savedCollection = localStorage.getItem('fish_game_collection');
                if (savedCollection !== null) {
                    discoveredFishIds = JSON.parse(savedCollection);
                }

                const savedQuality = localStorage.getItem('fish_game_quality_lvl');
                if (savedQuality !== null) {
                    qualityLevel = parseInt(savedQuality, 10);
                }

                const savedSize = localStorage.getItem('fish_game_size_lvl');
                if (savedSize !== null) {
                    sizeLevel = parseInt(savedSize, 10);
                }

                const savedSpawn = localStorage.getItem('fish_game_spawn_lvl');
                if (savedSpawn !== null) {
                    spawnLevel = parseInt(savedSpawn, 10);
                }

                const savedRarity = localStorage.getItem('fish_game_rarity_lvl');
                if (savedRarity !== null) {
                    rarityLevel = parseInt(savedRarity, 10);
                }
            } catch (e) {
                console.error("Could not load local save data:", e);
            }
            moneyCounter.innerText = currentMoney + '$';
            updateUpgradesUI();
            rebuildGalleryUI();
        }

        function saveGameProgress() {
            try {
                localStorage.setItem('fish_game_money', currentMoney);
                localStorage.setItem('fish_game_collection', JSON.stringify(discoveredFishIds));
                localStorage.setItem('fish_game_quality_lvl', qualityLevel);
                localStorage.setItem('fish_game_size_lvl', sizeLevel);
                localStorage.setItem('fish_game_spawn_lvl', spawnLevel);
                localStorage.setItem('fish_game_rarity_lvl', rarityLevel);
            } catch (e) {
                console.error("Could not write local save data:", e);
            }
        }

        // Reset Progress logic execution
        function resetGameProgress(e) {
            if(e) e.stopPropagation();
            if (confirm("Are you sure you want to reset your progress? This clears your collection log, upgrades and balance!")) {
                currentMoney = 0;
                discoveredFishIds = [];
                qualityLevel = 0;
                sizeLevel = 0;
                spawnLevel = 0;
                rarityLevel = 0;
                saveGameProgress();
                moneyCounter.innerText = '0$';
                updateUpgradesUI();
                rebuildGalleryUI();
                
                // Clear all active fish elements from the viewport
                sardinesList.forEach(fish => fish.element.remove());
                sardinesList = [];
            }
        }

        function rebuildGalleryUI() {
            // Clear current list content
            galleryContent.innerHTML = '';

            // Render details only for fish existing inside the discovered identifiers collection map
            FISH_DATABASE.forEach(fish => {
                if (discoveredFishIds.includes(fish.id)) {
                    const item = document.createElement('div');
                    item.classList.add('gallery-item');

                    const imgWrapper = document.createElement('div');
                    imgWrapper.classList.add('gallery-item-img-wrapper');

                    const img = document.createElement('img');
                    img.src = fish.imageSrc;
                    imgWrapper.appendChild(img);

                    const details = document.createElement('div');
                    details.classList.add('gallery-item-details');

                    const titleRow = document.createElement('div');
                    titleRow.classList.add('gallery-item-title-row');

                    const nameSpan = document.createElement('div');
                    nameSpan.classList.add('gallery-item-name');
                    nameSpan.innerText = fish.name;

                    const valueSpan = document.createElement('div');
                    valueSpan.classList.add('gallery-item-value');
                    valueSpan.innerText = fish.value + '$';

                    titleRow.appendChild(nameSpan);
                    titleRow.appendChild(valueSpan);

                    const descDiv = document.createElement('div');
                    descDiv.classList.add('gallery-item-desc');
                    descDiv.innerText = fish.description;

                    details.appendChild(titleRow);
                    details.appendChild(descDiv);

                    item.appendChild(imgWrapper);
                    item.appendChild(details);
                    galleryContent.appendChild(item);
                }
            });

            if (galleryContent.innerHTML === '') {
                const emptyMsg = document.createElement('div');
                emptyMsg.style.textAlign = 'center';
                emptyMsg.style.padding = '40px 10px';
                emptyMsg.style.color = '#b0c4de';
                emptyMsg.style.fontSize = '18px';
                emptyMsg.innerText = "empty, just like my head";
                galleryContent.appendChild(emptyMsg);
            }
        }

        function sendToRestingPosition() {
            if (isTakingPhoto) return;
            const restX = window.innerWidth / 2;
            const restY = window.innerHeight - (normalSize / 2) + 20; 
            cameraContainer.style.width = normalSize + 'px';
            cameraContainer.style.height = normalSize + 'px';
            cameraContainer.style.left = restX + 'px';
            cameraContainer.style.top = restY + 'px';
        }

        sendToRestingPosition();

        window.addEventListener('resize', () => {
            if (!isHolding && !isTakingPhoto) sendToRestingPosition();
        });

        window.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
            
            if (isHolding && !isTakingPhoto) {
                cameraContainer.style.transition = 'none';
                cameraContainer.style.left = mouseX + 'px';
                cameraContainer.style.top = mouseY + 'px';
            }
        });

        window.addEventListener('mousedown', (e) => {
            if (isTakingPhoto) return;

            if (e.button === 0) { // Left Click
                isHolding = true;
                cameraContainer.style.transition = 'left 0.3s ease-out, top 0.3s ease-out, width 0.3s ease-out, height 0.3s ease-out';
                cameraContainer.style.left = mouseX + 'px';
                cameraContainer.style.top = mouseY + 'px';
            } 
            else if (e.button === 1) { // Middle Click
                e.preventDefault();
                if (isHolding) {
                    takePicture();
                }
            }
        });

        window.addEventListener('mouseup', (e) => {
            if (e.button === 0 && isHolding) {
                isHolding = false;
                if (!isTakingPhoto) {
                    cameraContainer.style.transition = 'left 0.4s ease-out, top 0.4s ease-out, width 0.4s ease-out, height 0.4s ease-out';
                    sendToRestingPosition();
                }
            }
        });

        window.addEventListener('auxclick', (e) => {
            if (e.button === 1) e.preventDefault();
        });

        function toggleGallery(show) {
            if (show) {
                rebuildGalleryUI();
                galleryPanel.classList.add('active');
            } else {
                galleryPanel.classList.remove('active');
            }
        }

        // Helper function to pick a fish template based on configured rarity pool weights
        function getRandomFishTemplate() {
            // Adjust weights dynamically based on Rarity Luck Level
            // Each luck level slightly lowers common weight and raises rare weights
            const dynamicDatabase = FISH_DATABASE.map(fish => {
                let adjustedRarity = fish.rarity;
                if (rarityLevel > 0) {
                    if (fish.id === 'sardine') {
                        // Slowly reduce common fish weight
                        adjustedRarity = Math.max(20, fish.rarity - (rarityLevel * 2));
                    } else if (fish.id === 'Golden_sardine') {
                        // Tiny boost to ultra rare gold fish (+0.05 per lvl)
                        adjustedRarity = fish.rarity + (rarityLevel * 0.05);
                    } else if (fish.id === 'Whale_shark' || fish.id === 'Marlin' || fish.id === 'Mahi_mahi') {
                        // Decent boost to high tier fish (+0.2 per lvl)
                        adjustedRarity = fish.rarity + (rarityLevel * 0.2);
                    } else {
                        // Gentle boost to low mid-tier fish (+0.4 per lvl)
                        adjustedRarity = fish.rarity + (rarityLevel * 0.4);
                    }
                }
                return { ...fish, currentWeight: adjustedRarity };
            });

            const totalRarity = dynamicDatabase.reduce((sum, current) => sum + current.currentWeight, 0);
            let randomRoll = Math.random() * totalRarity;
            
            for (let i = 0; i < dynamicDatabase.length; i++) {
                if (randomRoll < dynamicDatabase[i].currentWeight) {
                    return FISH_DATABASE[i];
                }
                randomRoll -= dynamicDatabase[i].currentWeight;
            }
            return FISH_DATABASE[0];
        }

        // --- Sardine Spawning & Logic Engine ---
        function spawnSardine() {
            const side = Math.random() < 0.5 ? 'left' : 'right';
            
            // Get data archetype from database
            const fishData = getRandomFishTemplate();

            // Handle school size logic for Anchovies (3 to 10), otherwise single spawn
            let schoolSize = 1;
            if (fishData.id === 'anchovy') {
                schoolSize = Math.floor(Math.random() * 8) + 3;
            }

            // Group attributes so school entities swim tightly together
            const schoolBaseY = Math.random() * (window.innerHeight - (fishData.baseHeight * 2) - 60) + 20;
            const schoolBaseSpeed = Math.random() * (fishData.maxSpeed - fishData.minSpeed) + fishData.minSpeed;

            for (let s = 0; s < schoolSize; s++) {
                // Baseline 15% chance + size level bonus increases the chance slightly (1% per level up)
                const giantSpawnChance = 0.15 + (sizeLevel * 0.01);
                const isGiantVariant = Math.random() < giantSpawnChance;
                const sizeMultiplier = isGiantVariant ? 2.0 : 1.0;
                const finalWidth = fishData.baseWidth * sizeMultiplier;
                const finalHeight = fishData.baseHeight * sizeMultiplier;
                const finalValue = fishData.value * (isGiantVariant ? 2 : 1);

                const container = document.createElement('div');
                container.classList.add('sardine-container');
                container.style.width = finalWidth + 'px';
                container.style.height = finalHeight + 'px';
                
                const img = document.createElement('img');
                img.src = fishData.imageSrc;
                img.classList.add('sardine-img');
                
                img.style.animationDelay = (Math.random() * -0.7) + 's';
                container.appendChild(img);
                
                // Group the Y position tightly if they belong to a school
                let topPos;
                if (fishData.id === 'anchovy') {
                    topPos = schoolBaseY + (Math.random() * 40 - 20);
                } else {
                    topPos = Math.random() * (window.innerHeight - finalHeight - 60) + 20;
                }
                container.style.top = topPos + 'px';

                let startX, targetX, speed;
                // Giant variants swim slightly slower dynamically
                const variationSpeedMod = isGiantVariant ? 0.6 : 1.0;
                
                if (fishData.id === 'anchovy') {
                    speed = (schoolBaseSpeed + (Math.random() * 0.2 - 0.1)) * variationSpeedMod;
                } else {
                    speed = (Math.random() * (fishData.maxSpeed - fishData.minSpeed) + fishData.minSpeed) * variationSpeedMod; 
                }

                const padX = finalWidth + 40;

                // Stagger starting offsets horizontally to show tight grouping
                let horizontalOffset = 0;
                if (fishData.id === 'anchovy') {
                    horizontalOffset = s * (finalWidth * 0.45) + (Math.random() * 15);
                }

                if (side === 'left') {
                    startX = -padX - horizontalOffset; 
                    targetX = window.innerWidth + padX + horizontalOffset;
                    container.style.left = startX + 'px';
                    container.style.transform = 'scaleX(-1)'; 
                } else {
                    startX = window.innerWidth + padX + horizontalOffset;
                    targetX = -padX - horizontalOffset;
                    container.style.left = startX + 'px';
                    container.style.transform = 'scaleX(1)';
                }

                document.body.appendChild(container);

                const sardineObj = {
                    id: fishData.id,
                    element: container,
                    imgElement: img,
                    x: startX,
                    y: topPos,
                    targetX: targetX,
                    speed: speed,
                    direction: side === 'left' ? 1 : -1,
                    width: finalWidth,  
                    height: finalHeight,
                    value: finalValue,
                    name: fishData.name,
                    description: fishData.description,
                    sizeMultiplier: sizeMultiplier,
                    vStretch: fishData.vStretch !== undefined ? fishData.vStretch : 2.0,
                    hasBeenPhotographed: false
                };

                sardinesList.push(sardineObj);
            }

            // Handles spawn speed dynamically based on Spawn Rate upgrades
            let nextSpawnDelay = Math.random() * 3500 + 800;
            const spawnMultiplier = Math.pow(0.9, spawnLevel);
            nextSpawnDelay = nextSpawnDelay * spawnMultiplier;

            setTimeout(spawnSardine, nextSpawnDelay);
        }

        function updateSardines(timestamp) {
            // Calculate actual time passed relative to standard 60fps (16.66ms per frame)
            let delta = (timestamp - lastUpdateTime) / 16.666; 
            lastUpdateTime = timestamp;

            // Capping the maximum step. If the page was minimized/frozen, 
            // force it to treat the return as just 1 normal frame instead of trying to catch up all at once.
            if (delta > 3) delta = 1;

            for (let i = sardinesList.length - 1; i >= 0; i--) {
                const fish = sardinesList[i];
                // Multiply movement by delta to ensure steady, uniform swimming speeds
                fish.x += (fish.speed * fish.direction) * delta;
                fish.element.style.left = fish.x + 'px';

                if ((fish.direction === 1 && fish.x > fish.targetX) || 
                    (fish.direction === -1 && fish.x < fish.targetX)) {
                    fish.element.remove();
                    sardinesList.splice(i, 1);
                }
            }
            requestAnimationFrame(updateSardines);
        }

        setTimeout(spawnSardine, 1000);
        requestAnimationFrame(updateSardines);

        // --- Live Viewfinder Viewport Loop ---
        function drawViewfinderFrame() {
            if (isTakingPhoto) {
                requestAnimationFrame(drawViewfinderFrame);
                return;
            }

            const viewRect = document.getElementById('viewfinder').getBoundingClientRect();
            const scaleFactor = 4;
            
            photoCanvas.width = viewRect.width * scaleFactor;
            photoCanvas.height = viewRect.height * scaleFactor;
            
            pCtx.save();
            pCtx.scale(scaleFactor, scaleFactor);
            pCtx.imageSmoothingEnabled = false; // Pixel art filtering rendering switch
            
            pCtx.fillStyle = '#a0c4ff';
            pCtx.fillRect(0, 0, viewRect.width, viewRect.height);
            
            const zoomValue = parseFloat(zoomSlider.value);
            
            sardinesList.forEach(fish => {
                const fRect = fish.element.getBoundingClientRect();
                const imgRect = fish.imgElement.getBoundingClientRect();
                
                if (!(fRect.right < viewRect.left || fRect.left > viewRect.right || 
                      fRect.bottom < viewRect.top || fRect.top > viewRect.bottom)) {
                    
                    const relX = fRect.left - viewRect.left;
                    const relY = fRect.top - viewRect.top;
                    
                    pCtx.save();
                    pCtx.translate(viewRect.width / 2, viewRect.height / 2);
                    pCtx.scale(zoomValue, zoomValue);
                    
                    const fishCenterX = relX + fRect.width / 2;
                    const fishCenterY = relY + fRect.height / 2;
                    const offsetX = fishCenterX - viewRect.width / 2;
                    const offsetY = fishCenterY - viewRect.height / 2;
                    
                    pCtx.translate(offsetX, offsetY);
                    
                    if (fish.direction === 1) {
                        pCtx.scale(-1, 1);
                    } else {
                        pCtx.scale(1, 1);
                    }
                    
                    const liveScaleX = imgRect.width / fish.width;
                    const liveScaleY = imgRect.height / fish.height;
                    pCtx.scale(liveScaleX, liveScaleY);
                    
                    // Adjust y-scaling based on size variations
                    pCtx.scale(1.0, fish.vStretch);
                    
                    pCtx.drawImage(fish.imgElement, -fish.width / 2, -fish.height / 2, fish.width, fish.height);
                    pCtx.restore();
                }
            });
            
            pCtx.restore();
            requestAnimationFrame(drawViewfinderFrame);
        }
        
        requestAnimationFrame(drawViewfinderFrame);

        // --- Camera Picture Taking Operation ---
        function takePicture() {
            if (isTakingPhoto) return;
            isTakingPhoto = true;

            // 1. Flash effect
            flash.style.opacity = '1';
            flash.style.transition = 'none';
            setTimeout(() => {
                flash.style.transition = 'opacity 0.4s ease-out';
                flash.style.opacity = '0';
            }, 50);

            // 2. Capture freeze viewport frame
            const viewRect = document.getElementById('viewfinder').getBoundingClientRect();
            const zoomValue = parseFloat(zoomSlider.value);
            
            photoCanvas.width = viewRect.width * 4;
            photoCanvas.height = viewRect.height * 4;
            pCtx.save();
            pCtx.scale(4, 4);
            pCtx.fillStyle = '#a0c4ff';
            pCtx.fillRect(0, 0, viewRect.width, viewRect.height);
            
            let earnings = 0;

            sardinesList.forEach(fish => {
                const fRect = fish.element.getBoundingClientRect();
                const imgRect = fish.imgElement.getBoundingClientRect();
                
                if (!(fRect.right < viewRect.left || fRect.left > viewRect.right || 
                      fRect.bottom < viewRect.top || fRect.top > viewRect.bottom)) {
                    
                    let fishWorth = fish.value;

                    // Apply multipliers for brand new fish vs repeated on-screen photos
                    if (!discoveredFishIds.includes(fish.id)) {
                        fishWorth = fishWorth * 3;
                    } else if (fish.hasBeenPhotographed) {
                        fishWorth = fishWorth * 0.5;
                    }
                    
                    fish.hasBeenPhotographed = true;

                    // Calculate penalty scaling based on your explicit zoom out positions
                    // min=0.2, max=1.5. range size = 1.3
                    if (zoomValue === 0.2) { 
                        // If user is precisely at absolute max zoom out
                        fishWorth = fishWorth * 0.5;
                    } else if (zoomValue < 0.2 + (1.3 * 0.25)) { 
                        // Slider ranges from 0.2 (max out) to 1.5 (max in). 
                        // Being "above 3 quarters zoom out" means value is within bottom 25% of the range (< 0.525)
                        fishWorth = fishWorth * 0.75;
                    }

                    // Apply Photo Quality Upgrade Multipliers (1.1x per level)
                    fishWorth = fishWorth * Math.pow(1.1, qualityLevel);
                    
                    earnings += Math.round(fishWorth);
                    
                    // Unlock the card if it wasn't discovered before
                    if (!discoveredFishIds.includes(fish.id)) {
                        discoveredFishIds.push(fish.id);
                    }

                    const relX = fRect.left - viewRect.left;
                    const relY = fRect.top - viewRect.top;
                    
                    pCtx.save();
                    pCtx.translate(viewRect.width / 2, viewRect.height / 2);
                    pCtx.scale(zoomValue, zoomValue);
                    
                    const offsetX = (relX + fRect.width / 2) - viewRect.width / 2;
                    const offsetY = (relY + fRect.height / 2) - viewRect.height / 2;
                    pCtx.translate(offsetX, offsetY);
                    
                    if (fish.direction === 1) {
                        pCtx.scale(-1, 1);
                    } else {
                        pCtx.scale(1, 1);
                    }
                    
                    const liveScaleX = imgRect.width / fish.width;
                    const liveScaleY = imgRect.height / fish.height;
                    pCtx.scale(liveScaleX, liveScaleY);
                    
                    pCtx.scale(1.0, fish.vStretch);
                    
                    pCtx.drawImage(fish.imgElement, -fish.width / 2, -fish.height / 2, fish.width, fish.height);
                    pCtx.restore();
                }
            });

            // 3. Process Balance Changes 
            currentMoney += earnings;
            moneyCounter.innerText = currentMoney + '$';
            updateUpgradesUI();
            saveGameProgress();

            // 4. Trigger popups graphics UI updates
            if (earnings > 0) {
                moneyPopup.innerText = "+$" + earnings;
                moneyPopup.style.left = mouseX + 'px';
                moneyPopup.style.top = (mouseY - 80) + 'px';
                moneyPopup.style.opacity = '1';
            }

            // 5. Expand Viewfinder to show photo card presentation effect
            cameraContainer.style.transition = 'left 0.4s cubic-bezier(0.34, 1.56, 0.64, 1), top 0.4s cubic-bezier(0.34, 1.56, 0.64, 1), width 0.4s cubic-bezier(0.34, 1.56, 0.64, 1), height 0.4s cubic-bezier(0.34, 1.56, 0.64, 1)';
            cameraContainer.style.width = photoSize + 'px';
            cameraContainer.style.height = photoSize + 'px';
            cameraContainer.style.left = (window.innerWidth / 2) + 'px';
            cameraContainer.style.top = (window.innerHeight / 2) + 'px';

            setTimeout(() => {
                moneyPopup.style.opacity = '0';
                
                cameraContainer.style.transition = 'left 0.4s ease-in, top 0.4s ease-in, width 0.4s ease-in, height 0.4s ease-in';
                isTakingPhoto = false;
                
                if (isHolding) {
                    cameraContainer.style.transition = 'none';
                    cameraContainer.style.width = normalSize + 'px';
                    cameraContainer.style.height = normalSize + 'px';
                    cameraContainer.style.left = mouseX + 'px';
                    cameraContainer.style.top = mouseY + 'px';
                } else {
                    sendToRestingPosition();
                }
            }, 1800);
        }

        // Initialize progress state on bootstrap configuration lifecycle
        loadGameProgress();
    </script>
</body>
