<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fish photographing</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            background-color: #a0c4ff; /* Medium light blue */
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            cursor: default;
            user-select: none;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #ffffff;
            position: relative;
        }
        
        /* Money counter styling in top left */
        #money-counter {
            position: absolute;
            top: 20px;
            left: 20px;
            font-size: 28px;
            font-weight: bold;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.4);
            z-index: 100;
        }

        /* Money popup above the camera */
        #money-popup {
            position: absolute;
            font-size: 24px;
            font-weight: bold;
            color: #ffd700;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.6);
            pointer-events: none;
            z-index: 2000;
            opacity: 0;
            transform: translate(-50%, -100%);
            transition: opacity 0.3s ease-out, top 0.3s ease-out;
        }
        
        /* UI Control Layer */
        .ui-container {
            position: absolute;
            top: 20px;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            pointer-events: none;
            z-index: 10;
        }
        .instruction {
            text-align: center;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.2);
            font-size: 22px;
            font-weight: 600;
        }
        .instruction span {
            display: block;
            font-size: 16px;
            opacity: 0.8;
            margin-top: 5px;
        }
        
        /* Slider controls container */
        .controls {
            margin-top: 15px;
            pointer-events: auto; 
            background: rgba(0, 0, 0, 0.3);
            padding: 10px 20px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }
        .controls label {
            font-size: 14px;
            font-weight: bold;
        }
        .controls input[type="range"] {
            cursor: pointer;
            accent-color: #ffffff;
        }

        /* Squash and Stretch CSS Animation for active swimming */
        @keyframes swimWobble {
            0% { transform: scale(1, 1); }
            25% { transform: scale(1.08, 0.92); }
            50% { transform: scale(1, 1); }
            75% { transform: scale(0.92, 1.08); }
            100% { transform: scale(1, 1); }
        }

        /* Sardine Container - x2 bigger */
        .sardine-container {
            position: absolute;
            width: 180px;
            height: 90px;
            pointer-events: none;
            z-index: 5;
        }

        .sardine-img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            animation: swimWobble 0.7s infinite ease-in-out;
        }

        /* Camera Frame Container */
        #camera-container {
            position: absolute;
            width: 340px; 
            height: 340px;
            pointer-events: none;
            transform: translate(-50%, -50%);
            z-index: 1000;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: left 0.4s cubic-bezier(0.25, 1, 0.5, 1), 
                        top 0.4s cubic-bezier(0.25, 1, 0.5, 1), 
                        width 0.4s cubic-bezier(0.25, 1, 0.5, 1), 
                        height 0.4s cubic-bezier(0.25, 1, 0.5, 1);
        }

        /* The fishcamera image with a hole in it */
        #fish-camera-img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 2;
        }

        /* The Viewfinder/Hole where live rendering happens */
        #viewfinder {
            width: 65%; 
            height: 65%;
            border-radius: 10px;
            overflow: hidden;
            position: relative;
            z-index: 1;
            background: transparent;
        }

        /* Live Preview & Photo Capture Canvas combination layer */
        #photo-canvas {
            width: 100%;
            height: 100%;
            display: block; 
        }

        /* Flash overlay effect */
        #flash {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: white;
            opacity: 0;
            pointer-events: none;
            z-index: 2000;
        }
    </style>
</head>
<body>

    <div id="money-counter">0$</div>
    <div id="money-popup">+$0</div>
    <div id="flash"></div>
    <div class="ui-container">
        <div class="instruction">
            <span></span>
        </div>
        <div class="controls" onmousedown="event.stopPropagation();" onmouseup="event.stopPropagation();">
            <label for="zoomSlider"> Zoom Out</label>
            <input type="range" id="zoomSlider" min="0.4" max="1.5" step="0.05" value="1.2">
            <label for="zoomSlider">Zoom In</label>
        </div>
    </div>

    <!-- Camera Container -->
    <div id="camera-container">
        <img id="fish-camera-img" src="fishcamera.png" alt="Fish Camera">
        <div id="viewfinder">
            <canvas id="photo-canvas"></canvas>
        </div>
    </div>

    <script>
        const cameraContainer = document.getElementById('camera-container');
        const photoCanvas = document.getElementById('photo-canvas');
        const flash = document.getElementById('flash');
        const zoomSlider = document.getElementById('zoomSlider');
        const moneyCounter = document.getElementById('money-counter');
        const moneyPopup = document.getElementById('money-popup');
        const pCtx = photoCanvas.getContext('2d');
        
        let isHolding = false;
        let isTakingPhoto = false;
        let mouseX = 0;
        let mouseY = 0;
        let currentMoney = 0;

        const normalSize = 340; 
        const photoSize = 520;  

        let sardinesList = [];

        function sendToRestingPosition() {
            if (isTakingPhoto) return;
            const restX = window.innerWidth / 2;
            const restY = window.innerHeight - (normalSize / 2) + 20; 
            cameraContainer.style.width = normalSize + 'px';
            cameraContainer.style.height = normalSize + 'px';
            cameraContainer.style.left = restX + 'px';
            cameraContainer.style.top = restY + 'px';
        }

        sendToRestingPosition();

        window.addEventListener('resize', () => {
            if (!isHolding && !isTakingPhoto) sendToRestingPosition();
        });

        window.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
            
            if (isHolding && !isTakingPhoto) {
                cameraContainer.style.transition = 'none';
                cameraContainer.style.left = mouseX + 'px';
                cameraContainer.style.top = mouseY + 'px';
            }
        });

        window.addEventListener('mousedown', (e) => {
            if (isTakingPhoto) return;

            if (e.button === 0) { // Left Click
                isHolding = true;
                cameraContainer.style.transition = 'left 0.3s ease-out, top 0.3s ease-out, width 0.3s ease-out, height 0.3s ease-out';
                cameraContainer.style.left = mouseX + 'px';
                cameraContainer.style.top = mouseY + 'px';
            } 
            else if (e.button === 1) { // Middle Click
                e.preventDefault();
                if (isHolding) {
                    takePicture();
                }
            }
        });

        window.addEventListener('mouseup', (e) => {
            if (e.button === 0 && isHolding) {
                isHolding = false;
                if (!isTakingPhoto) {
                    cameraContainer.style.transition = 'left 0.4s ease-out, top 0.4s ease-out, width 0.4s ease-out, height 0.4s ease-out';
                    sendToRestingPosition();
                }
            }
        });

        window.addEventListener('auxclick', (e) => {
            if (e.button === 1) e.preventDefault();
        });

        // --- Sardine Spawning & Logic Engine ---
        function spawnSardine() {
            const side = Math.random() < 0.5 ? 'left' : 'right';
            
            const container = document.createElement('div');
            container.classList.add('sardine-container');
            
            const img = document.createElement('img');
            img.src = 'sardine.png';
            img.classList.add('sardine-img');
            
            img.style.animationDelay = (Math.random() * -0.7) + 's';
            container.appendChild(img);
            
            const topPos = Math.random() * (window.innerHeight - 150) + 20;
            container.style.top = topPos + 'px';

            let startX, targetX, speed;
            speed = Math.random() * 0.8 + 0.8; 

            if (side === 'left') {
                startX = -220; 
                targetX = window.innerWidth + 220;
                container.style.left = startX + 'px';
                container.style.transform = 'scaleX(-1)'; 
            } else {
                startX = window.innerWidth + 220;
                targetX = -220;
                container.style.left = startX + 'px';
                container.style.transform = 'scaleX(1)';
            }

            document.body.appendChild(container);

            const sardineObj = {
                element: container,
                imgElement: img,
                x: startX,
                y: topPos,
                targetX: targetX,
                speed: speed,
                direction: side === 'left' ? 1 : -1,
                width: 180,  
                height: 90
            };

            sardinesList.push(sardineObj);

            const nextSpawnDelay = Math.random() * 8000 + 2000;
            setTimeout(spawnSardine, nextSpawnDelay);
        }

        function updateSardines() {
            for (let i = sardinesList.length - 1; i >= 0; i--) {
                const fish = sardinesList[i];
                fish.x += fish.speed * fish.direction;
                fish.element.style.left = fish.x + 'px';

                if ((fish.direction === 1 && fish.x > fish.targetX) || 
                    (fish.direction === -1 && fish.x < fish.targetX)) {
                    fish.element.remove();
                    sardinesList.splice(i, 1);
                }
            }
            requestAnimationFrame(updateSardines);
        }

        setTimeout(spawnSardine, 1000);
        requestAnimationFrame(updateSardines);

        // --- Live Viewfinder Viewport Loop ---
        function drawViewfinderFrame() {
            if (isTakingPhoto) {
                requestAnimationFrame(drawViewfinderFrame);
                return;
            }

            const viewRect = document.getElementById('viewfinder').getBoundingClientRect();
            const scaleFactor = 4;
            
            photoCanvas.width = viewRect.width * scaleFactor;
            photoCanvas.height = viewRect.height * scaleFactor;
            
            pCtx.save();
            pCtx.scale(scaleFactor, scaleFactor);
            pCtx.imageSmoothingEnabled = true;
            pCtx.imageSmoothingQuality = 'high';
            
            pCtx.fillStyle = '#a0c4ff';
            pCtx.fillRect(0, 0, viewRect.width, viewRect.height);
            
            const zoomValue = parseFloat(zoomSlider.value);
            
            sardinesList.forEach(fish => {
                const fRect = fish.element.getBoundingClientRect();
                const imgRect = fish.imgElement.getBoundingClientRect();
                
                if (!(fRect.right < viewRect.left || fRect.left > viewRect.right || 
                      fRect.bottom < viewRect.top || fRect.top > viewRect.bottom)) {
                    
                    const relX = fRect.left - viewRect.left;
                    const relY = fRect.top - viewRect.top;
                    
                    pCtx.save();
                    pCtx.translate(viewRect.width / 2, viewRect.height / 2);
                    pCtx.scale(zoomValue, zoomValue);
                    
                    const fishCenterX = relX + fRect.width / 2;
                    const fishCenterY = relY + fRect.height / 2;
                    const offsetX = fishCenterX - viewRect.width / 2;
                    const offsetY = fishCenterY - viewRect.height / 2;
                    
                    pCtx.translate(offsetX, offsetY);
                    
                    if (fish.direction === 1) {
                        pCtx.scale(-1, 1);
                    } else {
                        pCtx.scale(1, 1);
                    }
                    
                    // Added live animation wobble variables
                    const liveScaleX = imgRect.width / fish.width;
                    const liveScaleY = imgRect.height / fish.height;
                    pCtx.scale(liveScaleX, liveScaleY);
                    
                    /* FIX: Added the matching x2 vertical stretch override (scale 1.0, 2.0)
                       directly into the live viewfinder context layer loop. Now the live view matches the final photo!
                    */
                    pCtx.scale(1.0, 2.0);
                    
                    pCtx.drawImage(fish.imgElement, -fish.width / 2, -fish.height / 2, fish.width, fish.height);
                    pCtx.restore();
                }
            });
            
            pCtx.restore();
            requestAnimationFrame(drawViewfinderFrame);
        }
        
        requestAnimationFrame(drawViewfinderFrame);

        // --- Camera Picture Taking Operation ---
        function takePicture() {
            if (isTakingPhoto) return;
            isTakingPhoto = true;

            // 1. Flash effect
            flash.style.opacity = '1';
            flash.style.transition = 'none';
            setTimeout(() => {
                flash.style.transition = 'opacity 0.4s ease-out';
                flash.style.opacity = '0';
            }, 50);

            // 2. Capture a frozen instance of what the viewfinder sees & count visible sardines
            const viewRect = document.getElementById('viewfinder').getBoundingClientRect();
            const zoomValue = parseFloat(zoomSlider.value);
            
            photoCanvas.width = viewRect.width * 4;
            photoCanvas.height = viewRect.height * 4;
            pCtx.save();
            pCtx.scale(4, 4);
            pCtx.fillStyle = '#a0c4ff';
            pCtx.fillRect(0, 0, viewRect.width, viewRect.height);
            
            let sardinesInPhoto = 0;

            sardinesList.forEach(fish => {
                const fRect = fish.element.getBoundingClientRect();
                const imgRect = fish.imgElement.getBoundingClientRect();
                
                if (!(fRect.right < viewRect.left || fRect.left > viewRect.right || 
                      fRect.bottom < viewRect.top || fRect.top > viewRect.bottom)) {
                    
                    sardinesInPhoto++;
                    const relX = fRect.left - viewRect.left;
                    const relY = fRect.top - viewRect.top;
                    
                    pCtx.save();
                    pCtx.translate(viewRect.width / 2, viewRect.height / 2);
                    pCtx.scale(zoomValue, zoomValue);
                    
                    const offsetX = (relX + fRect.width / 2) - viewRect.width / 2;
                    const offsetY = (relY + fRect.height / 2) - viewRect.height / 2;
                    pCtx.translate(offsetX, offsetY);
                    
                    if (fish.direction === 1) {
                        pCtx.scale(-1, 1);
                    } else {
                        pCtx.scale(1, 1);
                    }
                    
                    // Maintain natural live wobble trace when freezing frame
                    const liveScaleX = imgRect.width / fish.width;
                    const liveScaleY = imgRect.height / fish.height;
                    pCtx.scale(liveScaleX, liveScaleY);
                    
                    // Fixed Photo Output Override Multiplier (Stretched upward by x2)
                    pCtx.scale(1.0, 2.0);
                    
                    pCtx.drawImage(fish.imgElement, -fish.width / 2, -fish.height / 2, fish.width, fish.height);
                    pCtx.restore();
                }
            });
            pCtx.restore();

            // Calculate earnings
            const earnings = sardinesInPhoto * 15;
            currentMoney += earnings;
            moneyCounter.innerText = currentMoney + '$';

            // 3. Zoom UP and center camera frame
            setTimeout(() => {
                cameraContainer.style.transition = 'all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275)';
                cameraContainer.style.width = photoSize + 'px';
                cameraContainer.style.height = photoSize + 'px';
                cameraContainer.style.left = '50%';
                cameraContainer.style.top = '50%';

                // Show total money got from photo above the camera lens area
                moneyPopup.innerText = '+$' + earnings;
                moneyPopup.style.left = '50%';
                moneyPopup.style.top = 'calc(50% - ' + (photoSize / 2 + 15) + 'px)';
                moneyPopup.style.opacity = '1';
            }, 100);

            // 4. Return to handling state after 2.2 seconds
            setTimeout(() => {
                cameraContainer.style.transition = 'all 0.4s ease-in-out';
                isTakingPhoto = false;
                
                // Hide popup
                moneyPopup.style.opacity = '0';
                
                if (isHolding) {
                    cameraContainer.style.width = normalSize + 'px';
                    cameraContainer.style.height = normalSize + 'px';
                    cameraContainer.style.left = mouseX + 'px';
                    cameraContainer.style.top = mouseY + 'px';
                } else {
                    sendToRestingPosition();
                }
            }, 2200);
        }
    </script>
</body>
</html>
