<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fish photographing</title>
    <style>
        /* Import a fallback retro pixel font from Google Fonts just in case */
        @import url('https://fonts.googleapis.com/css2?family=VT323&display=swap');

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            /* Force crisp, sharp, non-blurred rendering for pixel-art styles */
            image-rendering: pixelated;
            image-rendering: crisp-edges;
        }
        body {
            background-color: #a0c4ff; /* Medium light blue */
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            cursor: default;
            user-select: none;
            /* Prioritize your local Scratch Pixel font, fallback to generic pixel and monospace fonts */
            font-family: 'Scratch Pixel', 'VT323', Monaco, Courier, monospace;
            color: #ffffff;
            position: relative;
            background-size: cover;
            background-position: center;
        }
        
        /* Money counter styling in top left */
        #money-counter {
            position: absolute;
            top: 20px;
            left: 20px;
            font-size: 32px;
            font-weight: bold;
            text-shadow: 2px 2px 0px #000000;
            z-index: 100;
        }

        /* Top Right Buttons Container */
        #top-right-container {
            position: absolute;
            top: 20px;
            right: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            z-index: 1100;
        }

        /* Reset Buttons Styling */
        .admin-btn {
            background: #ff3b30;
            color: white;
            border: 4px solid #000000;
            border-radius: 0px;
            padding: 6px 16px;
            cursor: pointer;
            font-family: inherit;
            font-weight: bold;
            font-size: 16px;
            pointer-events: auto;
            text-align: center;
            box-shadow: 2px 2px 0px #000000;
        }
        .admin-btn:hover {
            background: #d32f2f;
        }
        .admin-btn:active {
            transform: translate(2px, 2px);
            box-shadow: none;
        }
        #reset-area-btn {
            background: #ff9500;
        }
        #reset-area-btn:hover {
            background: #e08500;
        }

        /* Money popup above the camera */
        #money-popup {
            position: absolute;
            font-size: 28px;
            font-weight: bold;
            color: #ffd700;
            text-shadow: 2px 2px 0px #000000;
            pointer-events: none;
            z-index: 2000;
            opacity: 0;
            transform: translate(-50%, -100%);
            transition: opacity 0.3s ease-out, top 0.3s ease-out;
        }
        
        /* UI Control Layer */
        .ui-container {
            position: absolute;
            top: 20px;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            pointer-events: none;
            z-index: 10;
        }
        .instruction {
            text-align: center;
            text-shadow: 2px 2px 0px #000000;
            font-size: 24px;
        }
        .instruction span {
            display: block;
            font-size: 18px;
            opacity: 0.8;
            margin-top: 5px;
        }
        
        /* Slider controls container with pixel theme */
        .controls {
            margin-top: 15px;
            pointer-events: auto; 
            background: #222222;
            border: 4px solid #000000; /* Sharp black border */
            padding: 8px 16px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .controls label {
            font-size: 16px;
        }
        .controls input[type="range"] {
            cursor: pointer;
            accent-color: #ffffff;
        }

        /* Squash and Stretch CSS Animation for active swimming */
        @keyframes swimWobble {
            0% { transform: scale(1, 1); }
            25% { transform: scale(1.08, 0.92); }
            50% { transform: scale(1, 1); }
            75% { transform: scale(0.92, 1.08); }
            100% { transform: scale(1, 1); }
        }

        /* Fish Container */
        .sardine-container {
            position: absolute;
            pointer-events: none;
            z-index: 5;
        }

        .sardine-img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        /* Camera Frame Container */
        #camera-container {
            position: absolute;
            width: 340px; 
            height: 340px;
            pointer-events: none;
            transform: translate(-50%, -50%);
            z-index: 1000;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: left 0.4s cubic-bezier(0.25, 1, 0.5, 1), 
                        top 0.4s cubic-bezier(0.25, 1, 0.5, 1), 
                        width 0.4s cubic-bezier(0.25, 1, 0.5, 1), 
                        height 0.4s cubic-bezier(0.25, 1, 0.5, 1);
        }

        /* The fishcamera image with a hole in it */
        #fish-camera-img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 2;
        }

        /* The Viewfinder/Hole where live rendering happens */
        #viewfinder {
            width: 65%; 
            height: 65%;
            margin-top: 15px;      /* Shift down */
            margin-left: -12px;    /* Shift left */
            border-radius: 0px; 
            border: 4px solid transparent; /* Invisible frame border */
            overflow: hidden;
            position: relative;
            z-index: 1;
            background: transparent;
        }

        /* Live Preview & Photo Capture Canvas combination layer */
        #photo-canvas {
            width: 100%;
            height: 100%;
            display: block; 
        }

        /* Flash overlay effect */
        #flash {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: white;
            opacity: 0;
            pointer-events: none;
            z-index: 2000;
        }

        /* Zone Selector Widget Layout to the right of the camera */
        #zone-selector-widget {
            position: absolute;
            top: calc(100vh - 170px);
            right: 160px;
            width: 140px;
            background: #222222;
            border: 4px solid #000000;
            padding: 10px;
            z-index: 1100;
            pointer-events: auto;
            text-align: center;
            box-shadow: 3px 3px 0px #000000;
        }
        #zone-title {
            font-size: 14px;
            font-weight: bold;
            color: #ffd700;
            margin-bottom: 8px;
            text-shadow: 1px 1px 0px #000000;
            text-transform: uppercase;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .zone-controls-row {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 12px;
        }
        .zone-arrow-btn {
            background: #ffffff;
            color: #000000;
            border: 3px solid #000000;
            width: 36px;
            height: 36px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .zone-arrow-btn:hover:not(:disabled) {
            background: #ffd700;
        }
        .zone-arrow-btn:disabled {
            background: #555555;
            color: #888888;
            cursor: not-allowed;
            border-color: #444444;
        }
        #zone-lock-status {
            font-size: 11px;
            color: #ff3b30;
            margin-top: 6px;
            font-weight: bold;
        }

        /* Enlarged Gallery Button in Bottom Right */
        #gallery-btn {
            position: absolute;
            bottom: 25px;
            right: 25px;
            width: 110px; 
            height: 110px;
            cursor: pointer;
            z-index: 1100;
            pointer-events: auto;
            transition: transform 0.1s ease;
        }
        #gallery-btn:hover {
            transform: scale(1.05);
        }
        #gallery-btn:active {
            transform: scale(0.95);
        }
        #gallery-btn-img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        /* Upgrades Container on Bottom Left side rearranged into columns */
        #upgrades-container {
            position: absolute;
            bottom: 25px;
            left: 25px;
            display: flex;
            flex-direction: row;
            gap: 12px;
            z-index: 1100;
            pointer-events: auto;
        }
        .upgrade-column {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .upgrade-btn {
            background: #ffd700;
            color: #000000;
            border: 4px solid #000000;
            border-radius: 0px;
            padding: 10px 16px;
            cursor: pointer;
            font-family: inherit;
            font-weight: bold;
            font-size: 16px;
            text-align: left;
            min-width: 240px;
            box-shadow: 2px 2px 0px #000000;
        }
        .upgrade-btn:hover {
            background: #ffea70;
        }
        .upgrade-btn:disabled {
            background: #8c834e;
            color: #444444;
            cursor: not-allowed;
            box-shadow: none;
        }
        .upgrade-btn:active:not(:disabled) {
            transform: translate(2px, 2px);
            box-shadow: none;
        }

        /* RETRO PIXEL ART SCROLLABLE COLLECTION PANEL */
        #gallery-panel {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.9);
            width: 85%;
            max-width: 650px;
            height: 75%;
            background: #111e36; /* Fully Opaque Dark Navy background */
            border: 6px solid #000000; /* Heavy Sharp Black Outline */
            border-radius: 0px; /* 100% Sharp Corners */
            padding: 25px;
            display: flex;
            flex-direction: column;
            z-index: 1500;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s ease, transform 0.2s ease;
        }
        #gallery-panel.active {
            opacity: 1;
            pointer-events: auto;
            transform: translate(-50%, -50%) scale(1);
        }
        #gallery-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            border-bottom: 4px solid #000000; /* Sharp black divider line */
            padding-bottom: 12px;
        }
        #gallery-header h2 {
            font-size: 32px;
            letter-spacing: 1px;
            color: #ffd700; /* Gold heading */
            text-shadow: 2px 2px 0px #000000;
        }
        #gallery-close-btn {
            background: #ff5f56;
            color: white;
            border: 4px solid #000000; /* Sharp Black Outline */
            border-radius: 0px; /* Sharp Edges */
            padding: 6px 16px;
            cursor: pointer;
            font-family: inherit;
            font-weight: bold;
            font-size: 18px;
        }
        #gallery-close-btn:hover {
            background: #ff3b30;
        }
        #gallery-close-btn:active {
            transform: translate(2px, 2px);
        }
        #gallery-content {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
            padding-right: 8px;
        }
        /* Sharp Pixelated Custom scrollbar for collection panel */
        #gallery-content::-webkit-scrollbar {
            width: 12px;
        }
        #gallery-content::-webkit-scrollbar-track {
            background: #09101d;
            border-left: 4px solid #000000;
        }
        #gallery-content::-webkit-scrollbar-thumb {
            background: #ffffff;
            border: 4px solid #000000;
            border-radius: 0px;
        }
        #gallery-content::-webkit-scrollbar-thumb:hover {
            background: #cccccc;
        }
        
        /* Redesigned Sharp Retro Fish Record Card Layout */
        .gallery-item {
            background: #192c4d; /* Fully opaque layout container */
            border: 4px solid #000000; /* Sharp Black Outline */
            border-radius: 0px; /* Completely Sharp Edges */
            padding: 15px;
            display: flex;
            align-items: center;
            gap: 20px;
        }
        .gallery-item-img-wrapper {
            width: 100px;
            height: 70px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #0c1626;
            border: 4px solid #000000; /* Sharp Black Inner Frame Outline */
            border-radius: 0px; /* Sharp Edges */
            padding: 5px;
        }
        .gallery-item-img-wrapper img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }
        .gallery-item-details {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .gallery-item-title-row {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
        }
        .gallery-item-name {
            font-size: 22px;
            font-weight: bold;
            color: #ffffff;
            text-shadow: 2px 2px 0px #000000;
        }
        .gallery-item-value {
            font-size: 20px;
            font-weight: bold;
            color: #4cd964; /* Vibrant green for retro reward values */
            text-shadow: 2px 2px 0px #000000;
        }
        .gallery-item-desc {
            font-size: 16px;
            color: #b0c4de;
            line-height: 1.4;
        }

        /* Background toggle container styled contextually for the pixel theme */
        #bg-toggle-container {
            position: absolute;
            top: calc(100vh - 225px); /* Positioned cleanly right above the zone widget */
            right: 160px;
            width: 140px;
            background: #222222;
            border: 4px solid #000000;
            padding: 6px;
            z-index: 1100;
            pointer-events: auto;
            text-align: center;
            box-shadow: 3px 3px 0px #000000;
            display: none; /* Hidden by default, controlled via JS */
        }
        .toggle-btn {
            background: #ffffff;
            color: #000000;
            border: 3px solid #000000;
            padding: 4px 8px;
            font-family: inherit;
            font-weight: bold;
            font-size: 12px;
            cursor: pointer;
            width: 100%;
            text-transform: uppercase;
        }
        .toggle-btn:hover {
            background: #ffd700;
        }
        .toggle-btn:active {
            transform: translate(1px, 1px);
        }
    </style>
</head>

    <div id="money-counter">0$</div>
    
    <div id="top-right-container" onmousedown="event.stopPropagation();" onmouseup="event.stopPropagation();">
        <button id="reset-btn" class="admin-btn" onclick="resetGameProgress(event)">Reset All Progress</button>
        <button id="reset-area-btn" class="admin-btn" onclick="resetAreaProgress(event)">Reset Area Progress</button>
    </div>
    
    <div id="money-popup">+$0</div>
    <div id="flash"></div>
    <div class="ui-container">
        <div class="instruction">
            <span></span>
        </div>
        <div class="controls" onmousedown="event.stopPropagation();" onmouseup="event.stopPropagation();">
            <label for="zoomSlider"> Zoom Out</label>
            <input type="range" id="zoomSlider" min="0.2" max="1.5" step="0.05" value="1.2">
            <label for="zoomSlider">Zoom In</label>
        </div>
    </div>

    <div id="camera-container">
        <img id="fish-camera-img" src="fishcamera.png" alt="Fish Camera">
        <div id="viewfinder">
            <canvas id="photo-canvas"></canvas>
        </div>
    </div>

    <!-- Background toggle widget appeared contextually above the zone selector widget -->
    <div id="bg-toggle-container" onmousedown="event.stopPropagation();" onmouseup="event.stopPropagation();">
        <button id="bg-toggle-btn" class="toggle-btn" onclick="toggleCoralBackground()">Use plain BG</button>
    </div>

    <!-- Zone Selector widget with arrows situated to the right of the camera contextually -->
    <div id="zone-selector-widget" onmousedown="event.stopPropagation();" onmouseup="event.stopPropagation();">
        <div id="zone-title">Open Ocean</div>
        <div class="zone-controls-row">
            <button id="zone-prev-arrow" class="zone-arrow-btn" onclick="changeZone(-1)">&lt;</button>
            <button id="zone-next-arrow" class="zone-arrow-btn" onclick="changeZone(1)">&gt;</button>
        </div>
        <div id="zone-lock-status"></div>
    </div>

    <div id="upgrades-container" onmousedown="event.stopPropagation();" onmouseup="event.stopPropagation();">
        <div class="upgrade-column">
            <button id="upgrade-quality-btn" class="upgrade-btn" onclick="buyUpgrade('quality')">Photo Quality: Lvl 0 ($200)</button>
            <button id="upgrade-size-btn" class="upgrade-btn" onclick="buyUpgrade('size')">Size Increase: Lvl 0 ($200)</button>
        </div>
        <div class="upgrade-column">
            <button id="upgrade-spawn-btn" class="upgrade-btn" onclick="buyUpgrade('spawn')">Spawn Rate: Lvl 0 ($200)</button>
            <button id="upgrade-rarity-btn" class="upgrade-btn" onclick="buyUpgrade('rarity')">Rarity Luck: Lvl 0 ($200)</button>
        </div>
    </div>

    <div id="gallery-btn" onclick="toggleGallery(true)" onmousedown="event.stopPropagation();" onmouseup="event.stopPropagation();">
        <img id="gallery-btn-img" src="gallery.png" alt="Gallery">
    </div>

    <div id="gallery-panel" onmousedown="event.stopPropagation();" onmouseup="event.stopPropagation();">
        <div id="gallery-header">
            <h2>Fish Collection</h2>
            <button id="gallery-close-btn" onclick="toggleGallery(false)">Close</button>
        </div>
        <div id="gallery-content">

        // Handle upgrade purchase transactions
        function buyUpgrade(type) {
            const activeStats = getActiveLevels();
            if (type === 'quality') {
                const cost = getUpgradeCost(activeStats.qualityLevel);
                if (currentMoney >= cost) {
                    currentMoney -= cost;
                    activeStats.qualityLevel++;
                }
            } else if (type === 'size') {
                if (activeStats.sizeLevel >= 20) return; 
                const cost = getUpgradeCost(activeStats.sizeLevel + 4.4);
                if (currentMoney >= cost) {
                    currentMoney -= cost;
                    activeStats.sizeLevel++;
                }
            } else if (type === 'spawn') {
                if (activeStats.spawnLevel >= 15) return;
                const cost = getUpgradeCost(activeStats.spawnLevel + 12.5);
                if (currentMoney >= cost) {
                    currentMoney -= cost;
                    activeStats.spawnLevel++;
                }
            } else if (type === 'rarity') {
                if (activeStats.rarityLevel >= 10) return;
                const cost = getUpgradeCost(activeStats.rarityLevel + 9.7);
                if (currentMoney >= cost) {
                    currentMoney -= cost;
                    activeStats.rarityLevel++;
                }
            }
            moneyCounter.innerText = currentMoney + '$';
            updateUpgradesUI();
            saveGameProgress();
        }

            // Handle area purchasing logic
            if (!unlockedZones.includes(targetZone.id)) {
                if (currentMoney >= targetZone.costToUnlock) {
                    if (confirm(`Would you like to unlock the new area "${targetZone.name}" for $${targetZone.costToUnlock}?`)) {
                        currentMoney -= targetZone.costToUnlock;
                        unlockedZones.push(targetZone.id);
                        moneyCounter.innerText = currentMoney + '$';
                    } else {
                        return;
                    }
                } else {
                    alert(`This area is locked! You need $${targetZone.costToUnlock} to purchase it.`);
                    return;
                }
            }

            // Clear active fish components completely from view before swapping backgrounds
            clearAllActiveFishElements();

            // Set current active pointer index
            currentZoneIndex = targetIdx;

            // Apply area visuals
            applyZoneBackgroundVisuals();

            // Render current stats context
            updateUpgradesUI();
            saveGameProgress();

            // Reschedule the spawner sequence loops instantly
            if (activeSpawnTimeoutId) clearTimeout(activeSpawnTimeoutId);
            activeSpawnTimeoutId = setTimeout(spawnSardine, 600);

        // Helper function to pick a fish template based on configured rarity pool weights
        function getRandomFishTemplate() {
            const currentZone = getCurrentZoneData();
            const activeStats = getActiveLevels();
            const rarityLevel = activeStats.rarityLevel;

            // Adjust weights dynamically based on Rarity Luck Level within active zone pool
            const dynamicDatabase = currentZone.fish.map(fish => {
                let adjustedRarity = fish.rarity;
                if (rarityLevel > 0) {
                    if (fish.id === 'sardine') {
                        adjustedRarity = Math.max(20, fish.rarity - (rarityLevel * 2));
                    } else if (fish.id === 'Golden_sardine') {
                        adjustedRarity = fish.rarity + (rarityLevel * 0.05);
                    } else if (fish.id === 'Whale_shark' || fish.id === 'marlin' || fish.id === 'Mahi_mahi') {
                        adjustedRarity = fish.rarity + (rarityLevel * 0.2);
                    } else {
                        adjustedRarity = fish.rarity + (rarityLevel * 0.4);
                    }
                }
                return { ...fish, currentWeight: adjustedRarity };
            });

            const totalRarity = dynamicDatabase.reduce((sum, current) => sum + current.currentWeight, 0);
            let randomRoll = Math.random() * totalRarity;
            
            for (let i = 0; i < dynamicDatabase.length; i++) {
                if (randomRoll < dynamicDatabase[i].currentWeight) {
                    return currentZone.fish[i];
                }
                randomRoll -= dynamicDatabase[i].currentWeight;
            }
            return currentZone.fish[0];
        }

        // --- Sardine Spawning & Logic Engine ---
        function spawnSardine() {
            const currentZone = getCurrentZoneData();
            const activeStats = getActiveLevels();
            const sizeLevel = activeStats.sizeLevel;
            const spawnLevel = activeStats.spawnLevel;

            const side = Math.random() < 0.5 ? 'left' : 'right';
            
            // Get data archetype from database
            const fishData = getRandomFishTemplate();

            // Handle school size logic for Anchovies (3 to 10), otherwise single spawn
            let schoolSize = 1;
            if (fishData.id === 'anchovy') {
                schoolSize = Math.floor(Math.random() * 8) + 3;
            }

            // Group attributes so school entities swim tightly together
            const upgradesRect = document.getElementById('upgrades-container').getBoundingClientRect();
            const boundaryY = upgradesRect.top;

            let schoolMinY, schoolMaxY;
            if (fishData.isBottomDwelling) {
                schoolMinY = boundaryY;
                schoolMaxY = Math.max(boundaryY, window.innerHeight - (fishData.baseHeight * 2) - 20);
            } else {
                schoolMinY = 20;
                schoolMaxY = Math.max(20, boundaryY - (fishData.baseHeight * 2) - 20);
            }
            
            const schoolBaseY = Math.random() * (schoolMaxY - schoolMinY) + schoolMinY;
            const schoolBaseSpeed = Math.random() * (fishData.maxSpeed - fishData.minSpeed) + fishData.minSpeed;

            for (let s = 0; s < schoolSize; s++) {
                // Baseline 15% chance + size level bonus increases the chance slightly (1% per level up)
                const giantSpawnChance = 0.15 + (sizeLevel * 0.01);
                const isGiantVariant = Math.random() < giantSpawnChance;
                const sizeMultiplier = isGiantVariant ? 1.2 : 1.0;
                const finalWidth = fishData.baseWidth * sizeMultiplier;
                const finalHeight = fishData.baseHeight * sizeMultiplier;
                const finalValue = fishData.value * (isGiantVariant ? 2 : 1);

                const container = document.createElement('div');
                container.classList.add('sardine-container');
                container.style.width = finalWidth + 'px';
                container.style.height = finalHeight + 'px';
                
                const img = document.createElement('img');
                img.src = fishData.imageSrc;
                img.classList.add('sardine-img');

                if (fishData.movementStyle === "squash") {
                    img.style.animation = "swimWobble 0.7s infinite ease-in-out";
                    img.style.animationDelay = (Math.random() * -0.7) + "s";
                }
                
                container.appendChild(img);
                
                let minY, maxY;
                if (fishData.isBottomDwelling) {
                    minY = boundaryY;
                    maxY = Math.max(boundaryY, window.innerHeight - finalHeight - 20);
                } else {
                    minY = 20;
                    maxY = Math.max(20, boundaryY - finalHeight - 20);
                }

                // Group the Y position tightly if they belong to a school
                let topPos;
                if (fishData.id === 'anchovy') {
                    topPos = schoolBaseY + (Math.random() * 40 - 20);
                    topPos = Math.max(minY, Math.min(topPos, maxY));
                } else {
                    topPos = Math.random() * (maxY - minY) + minY;
                }
                container.style.top = topPos + 'px';

                let startX, targetX, speed;
                // Giant variants swim slightly slower dynamically
                const variationSpeedMod = isGiantVariant ? 0.6 : 1.0;
                
                if (fishData.id === 'anchovy') {
                    speed = (schoolBaseSpeed + (Math.random() * 0.2 - 0.1)) * variationSpeedMod;
                } else {
                    speed = (Math.random() * (fishData.maxSpeed - fishData.minSpeed) + fishData.minSpeed) * variationSpeedMod; 
                }

                const padX = finalWidth + 40;

                // Stagger starting offsets horizontally to show tight grouping
                let horizontalOffset = 0;
                if (fishData.id === 'anchovy') {
                    horizontalOffset = s * (finalWidth * 0.45) + (Math.random() * 15);
                }

                if (side === 'left') {
                    startX = -padX - horizontalOffset; 
                    targetX = window.innerWidth + padX + horizontalOffset;
                    container.style.left = startX + 'px';
                    container.style.transform = 'scaleX(-1)'; 
                } else {
                    startX = window.innerWidth + padX + horizontalOffset;
                    targetX = -padX - horizontalOffset;
                    container.style.left = startX + 'px';
                    container.style.transform = 'scaleX(1)';
                }

                document.body.appendChild(container);

                const sardineObj = {
                    id: fishData.id,
                    element: container,
                    imgElement: img,

                    x: startX,
                    y: topPos,
                    targetX: targetX,

                    speed: speed,
                    direction: side === 'left' ? 1 : -1,

                    width: finalWidth,
                    height: finalHeight,

                    value: finalValue,
                    name: fishData.name,
                    description: fishData.description,

                    sizeMultiplier: sizeMultiplier,
                    vStretch: fishData.vStretch !== undefined ? fishData.vStretch : 2.0,

    // NEW
                    movementStyle: fishData.movementStyle || "squash",
                    rotation: 0,
                    rotationSpeed: (Math.random() - 0.5) * 0.8,
                    
                    hasBeenPhotographed: false
                };

                sardinesList.push(sardineObj);
            }

            // Handles spawn speed dynamically based on Spawn Rate upgrades
            let nextSpawnDelay = Math.random() * 3500 + 800;
            const spawnMultiplier = Math.pow(0.9, spawnLevel);
            nextSpawnDelay = nextSpawnDelay * spawnMultiplier;

            activeSpawnTimeoutId = setTimeout(spawnSardine, nextSpawnDelay);
        }

        function updateSardines(timestamp) {
            // Calculate actual time passed relative to standard 60fps (16.66ms per frame)
            let delta = (timestamp - lastUpdateTime) / 16.666; 
            lastUpdateTime = timestamp;

            // Capping the maximum step. If the page was minimized/frozen, 
            // force it to treat the return as just 1 normal frame instead of trying to catch up all at once.
            if (delta > 3) delta = 1;

            for (let i = sardinesList.length - 1; i >= 0; i--) {
                const fish = sardinesList[i];
                // Multiply movement by delta to ensure steady, uniform swimming speeds
                fish.x += (fish.speed * fish.direction) * delta;
                fish.element.style.left = fish.x + 'px';

                if (fish.movementStyle === "rotate") {

                   fish.rotation += fish.rotationSpeed;

                // Keep it from spinning forever
                   if (fish.rotation > 20) fish.rotationSpeed *= -1;
                   if (fish.rotation < -20) fish.rotationSpeed *= -1;

                   const flip = fish.direction === 1 ? -1 : 1;

                   fish.element.style.transform =
                       `scaleX(${flip}) rotate(${fish.rotation}deg)`;
                }

                if ((fish.direction === 1 && fish.x > fish.targetX) || 
                    (fish.direction === -1 && fish.x < fish.targetX)) {
                    fish.element.remove();
                    sardinesList.splice(i, 1);
                }
            }
            requestAnimationFrame(updateSardines);
        }

        activeSpawnTimeoutId = setTimeout(spawnSardine, 1000);
        requestAnimationFrame(updateSardines);

        // Map and render the area's background image mapping precisely to CSS' background-size: cover
        function drawBackground(ctx, viewRect, zoomValue, currentZone) {
            if (currentZone.id === "coral_reef" && hideCoralImageBackground) {
                ctx.fillStyle = '#a99fe3';
                ctx.fillRect(0, 0, viewRect.width, viewRect.height);
                return;
            }

            ctx.fillStyle = currentZone.backgroundColor || '#a99fe3';
            ctx.fillRect(0, 0, viewRect.width, viewRect.height);

            if (currentZone.backgroundImage && currentZone.backgroundImage !== "") {
                const bgImg = loadedBgImages[currentZone.id];
                if (bgImg && bgImg.complete && bgImg.naturalWidth > 0) {
                    const W = window.innerWidth;
                    const H = window.innerHeight;
                    const IW = bgImg.naturalWidth;
                    const IH = bgImg.naturalHeight;
                    const WR = W / H;
                    const IR = IW / IH;
                    
                    let S, X_offset, Y_offset;
                    // Emulate background-size: cover logic
                    if (WR > IR) {
                        S = W / IW;
                        X_offset = 0;
                        Y_offset = (H - IH * S) / 2;
                    } else {
                        S = H / IH;
                        X_offset = (W - IW * S) / 2;
                        Y_offset = 0;
                    }

                    ctx.save();
                    
                    // Move context to the true center of the Viewfinder Frame
                    ctx.translate(viewRect.width / 2, viewRect.height / 2);
                    // Apply camera zoom dynamically to the background art as well
                    ctx.scale(zoomValue, zoomValue);
                    
                    // Find exactly where the top-left corner of the window aligns relative to the zoomed center of our camera
                    const winLeftRelativeToCenter = -(viewRect.left + viewRect.width / 2);
                    const winTopRelativeToCenter = -(viewRect.top + viewRect.height / 2);
                    
                    ctx.drawImage(
                        bgImg,
                        winLeftRelativeToCenter + X_offset,
                        winTopRelativeToCenter + Y_offset,
                        IW * S,
                        IH * S
                    );
                    ctx.restore();
                }
            }
        }

        // --- Live Viewfinder Viewport Loop ---
        function drawViewfinderFrame() {
            if (isTakingPhoto) {
                requestAnimationFrame(drawViewfinderFrame);
                return;
            }

            const viewRect = document.getElementById('viewfinder').getBoundingClientRect();
            const scaleFactor = 4;
            
            const targetWidth = Math.floor(viewRect.width * scaleFactor);
            const targetHeight = Math.floor(viewRect.height * scaleFactor);
            if (photoCanvas.width !== targetWidth || photoCanvas.height !== targetHeight) {
                photoCanvas.width = targetWidth;
                photoCanvas.height = targetHeight;
            }
            
            pCtx.save();
            pCtx.scale(scaleFactor, scaleFactor);
            pCtx.imageSmoothingEnabled = false; // Pixel art filtering rendering switch
            
            const currentZone = getCurrentZoneData();
            const zoomValue = parseFloat(zoomSlider.value);

            // Draw Background correctly aligned to CSS background-size: cover
            drawBackground(pCtx, viewRect, zoomValue, currentZone);
            
            sardinesList.forEach(fish => {
                const fRect = fish.element.getBoundingClientRect();
                const imgRect = fish.imgElement.getBoundingClientRect();
                
                if (!(fRect.right < viewRect.left || fRect.left > viewRect.right || 
                      fRect.bottom < viewRect.top || fRect.top > viewRect.bottom)) {
                    
                    const relX = fRect.left - viewRect.left;
                    const relY = fRect.top - viewRect.top;
                    
                    pCtx.save();
                    pCtx.translate(viewRect.width / 2, viewRect.height / 2);
                    pCtx.scale(zoomValue, zoomValue);
                    
                    const fishCenterX = relX + fRect.width / 2;
                    const fishCenterY = relY + fRect.height / 2;
                    const offsetX = fishCenterX - viewRect.width / 2;
                    const offsetY = fishCenterY - viewRect.height / 2;
                    
                    pCtx.translate(offsetX, offsetY);

                    if (fish.movementStyle === "rotate") {
                        pCtx.rotate(fish.rotation * Math.PI / 180);
                    }
                    
                    if (fish.direction === 1) {
                        pCtx.scale(-1, 1);
                    } else {
                        pCtx.scale(1, 1);
                    }
                    
                    const liveScaleX = imgRect.width / fish.width;
                    const liveScaleY = imgRect.height / fish.height;
                    pCtx.scale(liveScaleX, liveScaleY);
                    
                    // Adjust y-scaling based on size variations
                    pCtx.scale(1.0, fish.vStretch);
                    
                    pCtx.drawImage(fish.imgElement, -fish.width / 2, -fish.height / 2, fish.width, fish.height);
                    pCtx.restore();
                }
            });
            
            pCtx.restore();
            requestAnimationFrame(drawViewfinderFrame);
        }
        
        requestAnimationFrame(drawViewfinderFrame);

        // --- Camera Picture Taking Operation ---
        function takePicture() {
            if (isTakingPhoto) return;
            isTakingPhoto = true;

            // 1. Flash effect
            flash.style.opacity = '1';
            flash.style.transition = 'none';
            setTimeout(() => {
                flash.style.transition = 'opacity 0.4s ease-out';
                flash.style.opacity = '0';
            }, 50);

            // 2. Capture freeze viewport frame
            const viewRect = document.getElementById('viewfinder').getBoundingClientRect();
            const zoomValue = parseFloat(zoomSlider.value);
            
            photoCanvas.width = viewRect.width * 4;
            photoCanvas.height = viewRect.height * 4;
            pCtx.save();
            pCtx.scale(4, 4);
            
            const currentZone = getCurrentZoneData();

            // Draw captured mapped background correctly
            drawBackground(pCtx, viewRect, zoomValue, currentZone);
            
            let earnings = 0;
            const activeStats = getActiveLevels();

            sardinesList.forEach(fish => {
                const fRect = fish.element.getBoundingClientRect();
                const imgRect = fish.imgElement.getBoundingClientRect();
                
                if (!(fRect.right < viewRect.left || fRect.left > viewRect.right || 
                      fRect.bottom < viewRect.top || fRect.top > viewRect.bottom)) {
                    
                    let fishWorth = fish.value;

                    // Apply multipliers for brand new fish vs repeated on-screen photos
                    if (!discoveredFishIds.includes(fish.id)) {
                        fishWorth = fishWorth * 3;
                    } else if (fish.hasBeenPhotographed) {
                        fishWorth = fishWorth * 0.5;
                    }
                    
                    fish.hasBeenPhotographed = true;

                    // Calculate penalty scaling based on your explicit zoom out positions
                    // min=0.2, max=1.5. range size = 1.3
                    if (zoomValue === 0.2) { 
                        // If user is precisely at absolute max zoom out
                        fishWorth = fishWorth * 0.5;
                    } else if (zoomValue < 0.2 + (1.3 * 0.25)) { 
                        // Slider ranges from 0.2 (max out) to 1.5 (max in). 
                        // Being "above 3 quarters zoom out" means value is within bottom 25% of the range (< 0.525)
                        fishWorth = fishWorth * 0.75;
                    }

                    // Apply Photo Quality Upgrade Multipliers (1.1x per level)
                    fishWorth = fishWorth * Math.pow(1.1, activeStats.qualityLevel);
                    
                    earnings += Math.round(fishWorth);
                    
                    // Unlock the card if it wasn't discovered before
                    if (!discoveredFishIds.includes(fish.id)) {
                        discoveredFishIds.push(fish.id);
                    }

                    const relX = fRect.left - viewRect.left;
                    const relY = fRect.top - viewRect.top;
                    
                    pCtx.save();
                    pCtx.translate(viewRect.width / 2, viewRect.height / 2);
                    pCtx.scale(zoomValue, zoomValue);
                    
                    const offsetX = (relX + fRect.width / 2) - viewRect.width / 2;
                    const offsetY = (relY + fRect.height / 2) - viewRect.height / 2;
                    pCtx.translate(offsetX, offsetY);

                    if (fish.movementStyle === "rotate") {
                        pCtx.rotate(fish.rotation * Math.PI / 180);
                    }
                    
                    if (fish.direction === 1) {
                        pCtx.scale(-1, 1);
                    } else {
                        pCtx.scale(1, 1);
                    }
                    
                    const liveScaleX = imgRect.width / fish.width;
                    const liveScaleY = imgRect.height / fish.height;
                    pCtx.scale(liveScaleX, liveScaleY);
                    
                    pCtx.scale(1.0, fish.vStretch);
                    
                    pCtx.drawImage(fish.imgElement, -fish.width / 2, -fish.height / 2, fish.width, fish.height);
                    pCtx.restore();
                }
            });

            // 3. Process Balance Changes and logging area separate revenues
            currentMoney += earnings;
            activeStats.earnings = (activeStats.earnings || 0) + earnings;

            moneyCounter.innerText = currentMoney + '$';
            updateUpgradesUI();
            saveGameProgress();

            // 4. Trigger popups graphics UI updates
            if (earnings > 0) {
                moneyPopup.innerText = "+$" + earnings;
                moneyPopup.style.left = mouseX + 'px';
                moneyPopup.style.top = (mouseY - 80) + 'px';
                moneyPopup.style.opacity = '1';
            }

            // 5. Expand Viewfinder to show photo card presentation effect
            cameraContainer.style.transition = 'left 0.4s cubic-bezier(0.34, 1.56, 0.64, 1), top 0.4s cubic-bezier(0.34, 1.56, 0.64, 1), width 0.4s cubic-bezier(0.34, 1.56, 0.64, 1), height 0.4s cubic-bezier(0.34, 1.56, 0.64, 1)';
            cameraContainer.style.width = photoSize + 'px';
            cameraContainer.style.height = photoSize + 'px';
            cameraContainer.style.left = (window.innerWidth / 2) + 'px';
            cameraContainer.style.top = (window.innerHeight / 2) + 'px';

            setTimeout(() => {
                moneyPopup.style.opacity = '0';
                
                cameraContainer.style.transition = 'left 0.4s ease-in, top 0.4s ease-in, width 0.4s ease-in, height 0.4s ease-in';
                isTakingPhoto = false;
                
                if (isHolding) {
                    cameraContainer.style.transition = 'none';
                    cameraContainer.style.width = normalSize + 'px';
                    cameraContainer.style.height = normalSize + 'px';
                    cameraContainer.style.left = mouseX + 'px';
                    cameraContainer.style.top = mouseY + 'px';
                } else {
                    sendToRestingPosition();
                }
            }, 1800);
        }

        // Initialize progress state on bootstrap configuration lifecycle
        loadGameProgress();
    </script>
</body>
